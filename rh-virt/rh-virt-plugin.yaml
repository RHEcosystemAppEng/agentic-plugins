apiVersion: backstage.io/v1alpha1
kind: AiResource
metadata:
  name: rh-virt
  namespace: rh-virt
  title: Red Hat Virtualization
  description: >
    Automation capabilities for VM lifecycle management, provisioning,
    and inventory operations on OpenShift clusters using KubeVirt.
  tags:
    - ai-skill
    - virtualization
    - kubevirt
    - openshift
  annotations:
    agentic.redhat.com/lola-module: "true"
    agentic.redhat.com/lola-module-name: rh-virt
    agentic.redhat.com/repository: https://github.com/RHEcosystemAppEng/agentic-plugins
    agentic.redhat.com/path: rh-virt
  labels:
    agentic-plugins.redhat.com/version: "1.0"
    agentic-plugins.redhat.com/repo: "agentic-plugins"
  links:
    - url: https://github.com/RHEcosystemAppEng/agentic-plugins
      title: Source Repository
      icon: github
spec:
  type: plugin
  lifecycle: production
  owner: group:redhat/ai5-marketplace
  system: default/agentic-plugins
  disciplines:
    - platform-engineering
  categories:
    - virtualization
    - vm-lifecycle
  agents:
    - claude-code
    - opencode
    - cursor
  dependsOn:
    - mcpserver:agentic-plugins/openshift-mcp-server
