  # Federated modules — complete Lola packs hosted in external repositories.
  # Add them as regular module entries with a different repository URL.
  # The build identifies federated packs by comparing the repository field
  # against this repo's URL. Extra field (ref) is a project extension: required
  # here for CI/catalog pinning (40-character commit SHA). Lola ignores ref at
  # install time until https://github.com/LobsterTrap/lola/issues/180 — installs
  # use the repository default branch. Lola installs the full pack at path.
  # To request federation, open a PR adding the module entry with the "federation" label.
  # See FEDERATION_REQUEST_GUIDE.md.
  #
  # Example:
  # - name: "partner-network-tools"
  #   description: "Network troubleshooting skills for SDN and OVN diagnostics"
  #   version: "1.2.0"
  #   repository: "https://github.com/partner-org/network-skills"
  #   ref: "a1b2c3d4e5f6789012345678901234567890abcd"  # required: 40-character commit SHA
  #   path: "."                   # Lola pack root; all skills/ here are installed
  #   tags:
  #     - "networking"
  #     - "sdn"
  #     - "troubleshooting"
