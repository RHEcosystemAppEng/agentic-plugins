apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: rh-sre
  namespace: rh-sre
  title: Site Reliability Engineering
  description: >
    Agentic tools and automation for managing Red Hat platforms and
    infrastructure. Covers vulnerability management, fleet inventory,
    system monitoring, and operational excellence for SRE workflows.
  tags:
    - ai-skill
    - sre
    - monitoring
    - vulnerability-management
  annotations:
    backstage.io/techdocs-ref: url:https://github.com/RHEcosystemAppEng/agentic-plugins/blob/main/rh-sre/README.md
    agentic.redhat.com/lola-module: "true"
    agentic.redhat.com/lola-module-name: rh-sre
    agentic.redhat.com/repository: https://github.com/RHEcosystemAppEng/agentic-plugins
    agentic.redhat.com/path: rh-sre
  labels:
    agentic-plugins.redhat.com/version: "1.0"
    agentic-plugins.redhat.com/repo: "agentic-plugins"
  links:
    - url: https://github.com/RHEcosystemAppEng/agentic-plugins
      title: Source Repository
      icon: github
spec:
  owner: group:redhat/ecosystem-appeng
  dependsOn:
    - mcpserver:rh-agentic-plugins-mcps/red-hat-lightspeed
    - mcpserver:rh-agentic-plugins-mcps/ansible-automation-platform
