apiVersion: mcp/v1beta1
kind: MCPServer
metadata:
  namespace: rh-agentic-plugins-mcps
  name: red-hat-lightspeed
  title: Red Hat Lightspeed MCP Server
  description: >
    Red Hat Lightspeed MCP server providing CVE vulnerability data,
    risk assessment, system inventory, compliance checks, and remediation
    playbook generation via Red Hat Insights. Used across SRE and
    developer workflows.
  annotations:
    backstage.io/source-location: >-
      url:https://github.com/RHEcosystemAppEng/agentic-plugins/blob/main/rh-sre/mcps.json
  tags:
    - lightspeed
    - insights
    - cve
    - remediation
    - mcp-server
spec:
  type: local
  lifecycle: beta
  owner: group:redhat/ecosystem-appeng
  system: rh-agentic-plugins-mcps
  primitives: []
  packages:
    - type: container
      registry_name: quay.io
      name: redhat-services-prod/insights-management-tenant/insights-mcp/red-hat-lightspeed-mcp
      version: sha256:98ee33fa7cb690d02d33f57900ab95ad831b8e7985710e0ccb87f53ce1b09865
      environment_variables:
        - description: Lightspeed client ID for authentication
          name: LIGHTSPEED_CLIENT_ID
        - description: Lightspeed client secret for authentication
          name: LIGHTSPEED_CLIENT_SECRET
  remotes: []
