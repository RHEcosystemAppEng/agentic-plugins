apiVersion: mcp/v1beta1
kind: MCPServer
metadata:
  name: lightspeed-mcp-developer
  title: Red Hat Lightspeed MCP Server (Developer)
  description: >
    Red Hat Lightspeed MCP server for developer workflows.
    Provides vulnerability, advisor, inventory, and planning data
    from Red Hat Insights for application development and debugging.
  annotations:
    backstage.io/source-location: >-
      url:https://github.com/RHEcosystemAppEng/agentic-plugins/blob/main/rh-developer/mcps.json
  tags:
    - lightspeed
    - insights
    - developer
    - mcp-server
spec:
  type: local
  lifecycle: beta
  owner: group:redhat/ecosystem-appeng
  primitives: []
  packages:
    - type: container
      registry_name: quay.io
      name: redhat-services-prod/insights-management-tenant/insights-mcp/red-hat-lightspeed-mcp
      version: sha256:05dde29df5ab0be7230e0ec64c87e8e7fda12d77d01bd026b67486da714c1a94
      environment_variables:
        - description: Lightspeed client ID for authentication
          name: LIGHTSPEED_CLIENT_ID
        - description: Lightspeed client secret for authentication
          name: LIGHTSPEED_CLIENT_SECRET
  remotes: []
