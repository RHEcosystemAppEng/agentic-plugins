apiVersion: mcp/v1beta1
kind: MCPServer
metadata:
  name: aap-mcp-system-monitoring
  title: AAP MCP Server - System Monitoring
  description: >
    Ansible Automation Platform MCP server for system monitoring.
    Provides AAP health checks, capacity tracking, job activity metrics,
    and system performance monitoring.
  annotations:
    backstage.io/source-location: >-
      url:https://github.com/RHEcosystemAppEng/agentic-plugins/blob/main/rh-automation/mcps.json
  tags:
    - ansible
    - aap
    - automation
    - monitoring
    - mcp-server
spec:
  type: remote
  lifecycle: beta
  owner: group:redhat/ecosystem-appeng
  primitives: []
  packages: []
  remotes:
    - url: https://${AAP_MCP_SERVER}/system_monitoring/mcp
      environment_variables:
        - description: AAP MCP server hostname
          name: AAP_MCP_SERVER
