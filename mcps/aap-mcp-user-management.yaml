apiVersion: mcp/v1beta1
kind: MCPServer
metadata:
  name: aap-mcp-user-management
  title: AAP MCP Server - User Management
  description: >
    Ansible Automation Platform MCP server for user management.
    Provides user account operations, team management,
    role assignments, and access control.
  annotations:
    backstage.io/source-location: >-
      url:https://github.com/RHEcosystemAppEng/agentic-plugins/blob/main/rh-automation/mcps.json
  tags:
    - ansible
    - aap
    - automation
    - user-management
    - mcp-server
spec:
  type: remote
  lifecycle: beta
  owner: group:redhat/ecosystem-appeng
  primitives: []
  packages: []
  remotes:
    - url: https://${AAP_MCP_SERVER}/user_management/mcp
      environment_variables:
        - description: AAP MCP server hostname
          name: AAP_MCP_SERVER
