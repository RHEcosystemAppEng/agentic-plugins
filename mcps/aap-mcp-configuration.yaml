apiVersion: mcp/v1beta1
kind: MCPServer
metadata:
  name: aap-mcp-configuration
  title: AAP MCP Server - Configuration
  description: >
    Ansible Automation Platform MCP server for configuration management.
    Provides AAP platform settings, credential types, execution environments,
    and organization configuration.
  annotations:
    backstage.io/source-location: >-
      url:https://github.com/RHEcosystemAppEng/agentic-plugins/blob/main/rh-automation/mcps.json
  tags:
    - ansible
    - aap
    - automation
    - configuration
    - mcp-server
spec:
  type: remote
  lifecycle: beta
  owner: group:redhat/ecosystem-appeng
  primitives: []
  packages: []
  remotes:
    - url: https://${AAP_MCP_SERVER}/configuration/mcp
      environment_variables:
        - description: AAP MCP server hostname
          name: AAP_MCP_SERVER
