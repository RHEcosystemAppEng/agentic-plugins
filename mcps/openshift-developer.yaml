  description: >
    Red Hat OpenShift MCP server configured with comprehensive developer toolsets
    (core, config, helm, kubevirt, observability, ossm) for application development,
    deployment, debugging, and service mesh operations on OpenShift.
  annotations:
    backstage.io/source-location: >-
      url:https://github.com/RHEcosystemAppEng/agentic-plugins/blob/main/rh-developer/mcps.json
  tags:
    - openshift
    - developer
    - helm
    - service-mesh
    - mcp-server
spec:
