apiVersion: backstage.io/v1alpha1
kind: Location
metadata:
  name: rh-basic
  title: Getting Started Agentic Pack
  description: >
    Points to all AI skill catalog entities in the rh-basic agentic pack
    for Red Hat product exploration and getting started workflows.
  annotations:
    agentic.redhat.com/lola-module: "true"
    agentic.redhat.com/lola-module-name: rh-basic
    agentic.redhat.com/repository: https://github.com/RHEcosystemAppEng/agentic-plugins
    agentic.redhat.com/path: rh-basic
  labels:
    agentic-plugins.redhat.com/version: "1.0"
    agentic-plugins.redhat.com/repo: "agentic-plugins"
spec:
  targets:
    - ./skills/red-hat-cve-explainer/catalog-info.yaml
    - ./skills/red-hat-diagnostics/catalog-info.yaml
    - ./skills/red-hat-get-started/catalog-info.yaml
    - ./skills/red-hat-product-lifecycle/catalog-info.yaml
    - ./skills/red-hat-security-mcp-setup/catalog-info.yaml
    - ./skills/red-hat-support-severity/catalog-info.yaml
