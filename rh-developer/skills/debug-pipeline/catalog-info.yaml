apiVersion: backstage.io/v1alpha1
kind: AiResource
metadata:
  name: debug-pipeline
  namespace: rh-developer
  title: Debug Pipeline
  description: >
    Diagnose OpenShift Pipelines (Tekton) CI/CD failures including PipelineRun
    failures, TaskRun step errors, workspace/PVC binding issues, and
    authentication problems. Automates multi-step diagnosis including
    PipelineRun status, failed TaskRun analysis, step container logs, and
    related resource checks.
  labels:
    distribution: external
  annotations:
    backstage.io/source-location: >-
      url:https://github.com/RHEcosystemAppEng/agentic-plugins/blob/main/rh-developer/skills/debug-pipeline/SKILL.md
  tags:
    - ai-skill
    - developer
    - debugging
    - tekton
    - ci-cd
  links:
    - url: https://github.com/RHEcosystemAppEng/agentic-plugins
      title: Source Repository
      icon: github
spec:
  type: skill
  lifecycle: beta
  owner: group:redhat/ecosystem-appeng
  system: rh-developer
  disciplines:
    - debugging
  categories:
    - debugging
  agents:
    - claude-code
    - opencode
    - cursor
  dependsOn:
    - mcpserver:default/openshift-developer
    - mcpserver:default/podman
    - mcpserver:default/github
    - mcpserver:default/lightspeed-mcp-developer
