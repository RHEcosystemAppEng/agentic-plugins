apiVersion: backstage.io/v1alpha1
kind: AiResource
metadata:
  name: debug-pod
  namespace: rh-developer
  title: Debug Pod
  description: >
    Diagnose pod failures on OpenShift including CrashLoopBackOff,
    ImagePullBackOff, OOMKilled, and pending pods. Automates multi-step
    diagnosis including pod status, events, logs (current and previous),
    and resource constraint analysis.
  labels:
    distribution: external
  annotations:
    backstage.io/source-location: >-
      url:https://github.com/RHEcosystemAppEng/agentic-plugins/blob/main/rh-developer/skills/debug-pod/SKILL.md
