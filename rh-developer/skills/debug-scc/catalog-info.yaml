apiVersion: backstage.io/v1alpha1
kind: AiResource
metadata:
  name: debug-scc
  namespace: rh-developer
  title: Debug SCC
  description: >
    Diagnose OpenShift Security Context Constraint (SCC) violations that
    prevent pods from being created. Automates multi-step diagnosis including
    Deployment status, ReplicaSet FailedCreate events, security context field
    extraction, SCC rejection parsing, and ServiceAccount SCC binding
    analysis.
  labels:
    distribution: external
  annotations:
    backstage.io/source-location: >-
      url:https://github.com/RHEcosystemAppEng/agentic-plugins/blob/main/rh-developer/skills/debug-scc/SKILL.md
  tags:
    - ai-skill
    - developer
    - debugging
    - scc
    - security
  links:
    - url: https://github.com/RHEcosystemAppEng/agentic-plugins
      title: Source Repository
      icon: github
spec:
  type: skill
  lifecycle: beta
  owner: group:redhat/ecosystem-appeng
  system: rh-developer
  disciplines:
    - debugging
  categories:
    - debugging
  agents:
    - claude-code
    - opencode
    - cursor
  dependsOn:
    - mcpserver:rh-agentic-plugins-mcps/openshift-mcp-server
    - mcpserver:rh-agentic-plugins-mcps/podman
    - mcpserver:rh-agentic-plugins-mcps/github
    - mcpserver:rh-agentic-plugins-mcps/red-hat-lightspeed
