apiVersion: backstage.io/v1alpha1
kind: AiResource
metadata:
  name: debug-rhel
  namespace: rh-developer
  title: Debug RHEL
  description: >
    Diagnose RHEL system issues including systemd service failures, SELinux
    denials, firewall blocking, and system resource problems. Automates
    multi-step diagnosis including journalctl log analysis, SELinux denial
    detection, firewall rule inspection, and systemd unit status.
  labels:
    distribution: external
  annotations:
    backstage.io/source-location: >-
      url:https://github.com/RHEcosystemAppEng/agentic-plugins/blob/main/rh-developer/skills/debug-rhel/SKILL.md
