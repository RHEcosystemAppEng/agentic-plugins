apiVersion: backstage.io/v1alpha1
kind: AiResource
metadata:
  name: rh-automation
  namespace: rh-automation
  title: Automation
  description: >
    Automation governance for Ansible Automation Platform. Audit AAP
    configuration against Red Hat best practices, run governed execution
    with check mode and rollback, and perform forensic failure analysis.
  tags:
    - ai-skill
    - ansible
    - automation
    - governance
  annotations:
    agentic.redhat.com/lola-module: "true"
    agentic.redhat.com/lola-module-name: rh-automation
    agentic.redhat.com/repository: https://github.com/RHEcosystemAppEng/agentic-plugins
    agentic.redhat.com/path: rh-automation
  labels:
    agentic-plugins.redhat.com/version: "1.0"
    agentic-plugins.redhat.com/repo: "agentic-plugins"
  links:
    - url: https://github.com/RHEcosystemAppEng/agentic-plugins
      title: Source Repository
      icon: github
spec:
  type: plugin
  lifecycle: production
  owner: group:redhat/ecosystem-appeng
  system: agentic-plugins
  disciplines:
    - operations
  categories:
    - automation
    - governance
  agents:
    - claude-code
    - opencode
    - cursor
  dependsOn:
    - mcpserver:agentic-plugins/ansible-automation-platform
